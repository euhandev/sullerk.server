events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # --- Configuration for your Services ---
    server {
        listen 80;
        
        # --- DOMAIN CONFIGURATION ---
        # Replace '_' with your domain name (e.g., example.com) once you have one.
        # For now, '_' allows access via your Public IP.
        server_name _;

        # 1. API Service (App)
        location / {
            proxy_pass http://api:8989;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Jenkins Service
        # We put Jenkins on a sub-path /jenkins/
        location /jenkins {
            proxy_pass http://jenkins:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Required for Jenkins' built-in CSRF protection
            proxy_redirect http://jenkins:8080 $scheme://$host/jenkins;
            
            # Allow large uploads (important for Jenkins/Plugins/Artifacts)
            client_max_body_size 50M;
            client_body_buffer_size 128k;
        }

        # 3. Mongo Express (Admin UI) - Optional, keep mapped to /mongo-admin
        location /mongo-admin {
            proxy_pass http://mongo-express:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
